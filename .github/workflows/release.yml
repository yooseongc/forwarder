name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  create-release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: "SSH Forwarder ${{ github.ref_name }}"
          body: |
            ## SSH Forwarder ${{ github.ref_name }}

            ### 설치
            1. `.msi` 파일을 다운로드합니다.
            2. 실행하여 설치합니다.

            ### 변경 사항
            [CHANGELOG](https://github.com/${{ github.repository }}/blob/main/CHANGELOG.md) 참조
          draft: true
          prerelease: false
